name: Build BlockLightMultiplier

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      id: maven-build
      run: mvn -B package --file pom.xml | tee build.log
      
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BlockLightMultiplier-Jar
        path: target/BlockLightMultiplier.jar
        if-no-files-found: error

    # ビルド失敗時の処理: ログを解析し、Issueを作成して報告する
    # ※ 本格的なAI修正にはOpenAI APIキー等が必要ですが、
    #    ここではビルドログを添付したIssueを自動作成することで、
    #    AIアシスタント（Copilot等）が修正しやすくします。
    - name: Report Build Failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let log = '';
          try {
            log = fs.readFileSync('build.log', 'utf8');
            // ログが長すぎる場合は末尾2000文字を抽出
            if (log.length > 2000) log = log.substring(log.length - 2000);
          } catch (e) {
            log = 'Log file not found.';
          }
          
          const issueBody = `
          ## 🚨 自動ビルド失敗レポート
          
          **作成者**: @appipinopi
          **グループ**: yggdrasil
          
          ビルドプロセス中にエラーが発生しました。
          AIアシスタントによる修正が必要です。以下はログの抜粋です。
          
          \`\`\`
          ${log}
          \`\`\`
          
          [詳細なログを確認する](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
          `;
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `⚠️ Build Failed: ${context.sha.substring(0, 7)}`,
            body: issueBody,
            labels: ['build-failure', 'ai-fix-needed']
          });
